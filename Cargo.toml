[package]
name = "deadlocked"
version = "4.2.0"
edition = "2024"

[dependencies]
arboard = { version = "3.6", default-features = false }
bincode = { version = "2.0", features = ["std", "serde"] }
bytemuck = "1.22"
crossbeam = "0.8"
egui = "0.32"
egui_glow = { version = "0.32", features = ["winit"] }
egui-winit = { version = "0.32", default-features = false, features = ["x11"] }
env_logger = { version = "0.11", default-features = false }
epaint = { version = "0.32", features = ["serde"] }
glam = { version = "0.30", features = ["bytemuck", "serde"] }
glutin = "0.32"
glutin-winit = "0.5"
log = "0.4"
nix = { version = "0.30", features = ["ioctl"] }
rand = "0.9"
rand_distr = "0.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
strum = { version = "0.27", features = ["derive"] }
toml = "0.9"
tungstenite = "0.27"
ureq = { version = "3.0", features = ["json"] }
url = "2.5"
winit = { version = "0.30", default-features = false, features = ["x11"] }
uuid = { version = "1.18", features = ["v4", "serde"] }

[profile.dev]
overflow-checks = false

[profile.release]
lto = true
strip = "debuginfo"
debug = true
