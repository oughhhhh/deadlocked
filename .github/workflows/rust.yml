name: Rust

on:
  push:
    branches: [ "rust" ]
  pull_request:
    branches: [ "rust" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose

    - name: Upload Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          target/release/deadlocked
        tag_name: deadlocked
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
