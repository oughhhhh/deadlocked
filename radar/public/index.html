<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
    <title>CS2 Radar</title>
</head>
<body>
    <!-- Connection Status Indicator -->
    <div class="connection-status">
        <div class="status-indicator" id="connectionIndicator"></div>
        <span id="connectionText">Connecting...</span>
    </div>

    <div class="main-container">
        <!-- Left Team Panel -->
        <div class="team-panel">
            <div class="panel-header">
                <div class="team-label terrorist">Opponents</div>
                <div class="team-score" id="terroristScore">0</div>
            </div>
            <div class="player-list" id="leftPlayerList">
            </div>
        </div>

        <!-- Center Radar Section -->
        <div class="radar-section">
            <div class="radar-header">
                <div class="game-info">
                    <div class="map-info">
                        <div class="map-label">Map</div>
                        <div class="map-name" id="mapName">DE_MIRAGE</div>
                    </div>
                    <div class="round-info">
                        <div class="round-label">Round</div>
                        <div class="round-number" id="roundNumber">1</div>
                    </div>
                    <div class="timer-info">
                        <div class="timer-label">Time</div>
                        <div class="round-time" id="roundTime">1:55</div>
                    </div>
                </div>
            </div>

            <!-- Radar Container -->
            <div class="radar-container">
                <div class="radar">
                    <img id="radar-background" src="" alt="Radar Background" />

                    <div class="radar-content">
                    </div>

                    <div class="radar-overlay"></div>
                </div>
            </div>

            <!-- Radar Controls -->
            <div class="radar-controls">
                <button class="control-btn" id="zoomIn" title="Zoom In (+)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="M21 21l-4.35-4.35"></path>
                        <line x1="8" y1="11" x2="14" y2="11"></line>
                        <line x1="11" y1="8" x2="11" y2="14"></line>
                    </svg>
                </button>
                <button class="control-btn" id="zoomOut" title="Zoom Out (-)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="M21 21l-4.35-4.35"></path>
                        <line x1="8" y1="11" x2="14" y2="11"></line>
                    </svg>
                </button>
                <button class="control-btn" id="resetZoom" title="Reset Zoom (0)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2H5a2 2 0 00-2 2z"></path>
                        <line x1="9" y1="9" x2="15" y2="15"></line>
                        <line x1="15" y1="9" x2="9" y2="15"></line>
                    </svg>
                </button>
            </div>
        </div>

        <div class="team-panel">
            <div class="panel-header">
                <div class="team-label counter-terrorist">Teammates</div>
                <div class="team-score" id="ctScore">0</div>
            </div>
            <div class="player-list" id="rightPlayerList">
            </div>
        </div>
    </div>

    <script src="index.js" defer></script>
</body>
</html>
